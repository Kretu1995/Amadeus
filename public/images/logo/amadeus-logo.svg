<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Define gradients and effects -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8b84a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4952b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c47d1b;stop-opacity:1" />
    </linearGradient>

    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background (transparent) -->
  <!-- Main text: AMADEUS in elegant serif style -->
  <text
    x="200"
    y="85"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="500"
    letter-spacing="2"
    text-anchor="middle"
    fill="url(#goldGradient)"
    filter="url(#goldGlow)"
  >
    AMADEUS
  </text>

  <!-- Decorative underline -->
  <line
    x1="80"
    y1="100"
    x2="320"
    y2="100"
    stroke="url(#goldGradient)"
    stroke-width="2"
    opacity="0.6"
  />

  <!-- Decorative accent dot -->
  <circle
    cx="200"
    cy="105"
    r="2.5"
    fill="url(#goldGradient)"
    opacity="0.8"
  />
</svg>